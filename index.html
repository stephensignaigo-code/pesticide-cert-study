    mustKnow: ["Most ornamental diseases are caused by FUNGI","Fungal spores spread by wind, water, insects, and tools — need moisture and correct temperature to infect","Leaf spots appear first on LOWER leaves, progress up the plant","Black spot = most serious disease of ROSES","Rusts have complicated life cycles often requiring TWO separate hosts","Cedar-apple rust = galls on red cedar + leaf spots on apple","Powdery mildew: moderate temps (60-90°F), high relative humidity, lush growth from high-N fertilization","Root rot: excess soil moisture; decayed, brown-to-black roots","Vascular wilt: fungi in water-conducting vessels; discolored streaks in wood; remove severely infected trees INCLUDING ROOTS","Fire blight (bacterial): most serious on apple, pear, crab apple, pyracantha; spread by insects visiting flowers (including bees) in bloom; prune out infected branches","Crown gall: caused by BACTERIA (not fungi); soft swelling of roots/stems","Viruses: controlled by controlling insect vectors and sanitation — pesticides usually don't control viral diseases","Nematodes: diagnosed by soil/root assay — not visible by eye"],

// QUIZ ENGINE
// ============================================================
function QuizEngine({ chapters, bookLabel, accentColor, onExit, autoStart }) {
  const autoChapter = (autoStart && chapters.length === 1) ? chapters[0] : null;
  const initQuestions = autoChapter ? autoChapter.questions : [];
  const [mode, setMode] = useState(autoChapter ? "quiz" : "select");
  const [activeChapter, setActiveChapter] = useState(autoChapter);
  const [questions, setQuestions] = useState(initQuestions);
  const [currentQ, setCurrentQ] = useState(0);
  const [selectedAnswer, setSelectedAnswer] = useState(null);
  const [showExplanation, setShowExplanation] = useState(false);
  const [score, setScore] = useState(0);
  const [quizAnswers, setQuizAnswers] = useState([]);

  const startQuiz = (ch) => {
    const qs = ch ? ch.questions : chapters.flatMap(c => c.questions.map(q => ({ ...q, chapter: c.title })));
    setActiveChapter(ch);
    setQuestions(qs);
    setCurrentQ(0);
    setSelectedAnswer(null);
    setShowExplanation(false);
    setScore(0);
    setQuizAnswers([]);
    setMode("quiz");
  };

  const handleAnswer = (opt) => {
    if (selectedAnswer) return;
    const correct = opt[0] === questions[currentQ].answer;
    setSelectedAnswer(opt);
    setShowExplanation(true);
    if (correct) setScore(s => s + 1);
    setQuizAnswers(prev => [...prev, correct]);
  };

  const nextQ = () => {
    if (currentQ + 1 >= questions.length) { setMode("results"); return; }
    setCurrentQ(q => q + 1);
    setSelectedAnswer(null);
    setShowExplanation(false);
  };

  const ac = accentColor;

  if (mode === "select") {
    return (
      <div>
        <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: "1rem", flexWrap: "wrap", gap: "0.5rem" }}>
          <p style={{ color: "#81c784", fontSize: "0.9rem" }}>Select a chapter to study, or take the full practice exam.</p>
          <button onClick={() => startQuiz(null)} style={{ background: ac, color: "#fff", border: "none", borderRadius: 8, padding: "0.6rem 1.2rem", fontSize: "0.9rem" }}>📝 Full Practice Exam</button>
        </div>
        <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fill, minmax(240px, 1fr))", gap: "0.75rem" }}>
          {chapters.map(ch => (
            <div key={ch.id} onClick={() => onExit("chapter", ch)}
              style={{ background: "#1a2e1a", borderRadius: 10, padding: "1rem 1.25rem", border: "1px solid #2d5a27", cursor: "pointer" }}
              onMouseEnter={e => e.currentTarget.style.borderColor = ac}
              onMouseLeave={e => e.currentTarget.style.borderColor = "#2d5a27"}>
              <div style={{ fontSize: "1.4rem", marginBottom: "0.4rem" }}>{ch.emoji}</div>
              <div style={{ color: "#6ee7b7", fontSize: "0.72rem", marginBottom: "0.2rem" }}>Chapter {ch.id}</div>
              <div style={{ color: "#a5d6a7", fontWeight: "bold", fontSize: "0.9rem", marginBottom: "0.4rem" }}>{ch.title}</div>
              <div style={{ color: "#81c784", fontSize: "0.78rem" }}>{ch.questions.length} questions · {ch.keyTopics.length} topics</div>
            </div>
          ))}
        </div>
      </div>
    );
  }

  if (mode === "results") {
    const pct = Math.round((score / questions.length) * 100);
    const passColor = pct >= 70 ? "#22c55e" : "#ef4444";
    return (
      <div style={{ maxWidth: 500, margin: "0 auto", textAlign: "center", padding: "2rem 0" }}>
        <div style={{ fontSize: "3.5rem", marginBottom: "0.75rem" }}>{pct >= 70 ? "🎓" : "📚"}</div>
        <h2 style={{ color: "#a5d6a7", fontSize: "1.5rem", marginBottom: "0.5rem" }}>Quiz Complete</h2>
        <p style={{ color: "#81c784", marginBottom: "1.5rem", fontSize: "0.9rem" }}>{activeChapter ? activeChapter.title : "Full Practice Exam"}</p>
        <div style={{ background: "#1a2e1a", borderRadius: 14, padding: "1.5rem", marginBottom: "1.5rem", border: `2px solid ${passColor}` }}>
          <div style={{ fontSize: "3rem", fontWeight: "bold", color: passColor }}>{pct}%</div>
          <div style={{ color: "#a5d6a7", marginTop: "0.5rem" }}>{score} of {questions.length} correct</div>
          <div style={{ marginTop: "0.75rem", color: pct >= 70 ? "#86efac" : "#fca5a5", fontSize: "0.9rem" }}>
            {pct >= 70 ? "✓ Passing score — solid work!" : "✗ Below 70% — review weak areas and retry"}
          </div>
        </div>
        <div style={{ display: "flex", gap: "0.75rem", justifyContent: "center", flexWrap: "wrap" }}>
          <button onClick={() => setMode("select")} style={{ background: "#2d5a27", color: "#e8f5e9", border: "none", borderRadius: 8, padding: "0.65rem 1.2rem", fontSize: "0.9rem" }}>← Back</button>
          <button onClick={() => startQuiz(activeChapter)} style={{ background: ac, color: "#fff", border: "none", borderRadius: 8, padding: "0.65rem 1.2rem", fontSize: "0.9rem" }}>Retry</button>
        </div>
      </div>
    );
  }

  const q = questions[currentQ];
  const progress = (currentQ / questions.length) * 100;
  return (
    <div style={{ maxWidth: 640, margin: "0 auto" }}>
      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: "0.75rem" }}>
        <button onClick={() => setMode("select")} style={{ background: "transparent", color: "#81c784", border: "1px solid #2d5a27", borderRadius: 6, padding: "0.35rem 0.7rem", fontSize: "0.82rem" }}>← Exit</button>
        <span style={{ color: "#81c784", fontSize: "0.88rem" }}>{currentQ + 1} / {questions.length}</span>
        <span style={{ color: ac, fontWeight: "bold", fontSize: "0.88rem" }}>Score: {score}</span>
      </div>
      <div style={{ height: 5, background: "#1a2e1a", borderRadius: 3, marginBottom: "1.25rem" }}>
        <div style={{ height: "100%", width: `${progress}%`, background: ac, borderRadius: 3, transition: "width 0.3s" }} />
      </div>
      {q.chapter && <div style={{ color: "#6ee7b7", fontSize: "0.75rem", marginBottom: "0.6rem", textTransform: "uppercase", letterSpacing: "0.05em" }}>{q.chapter}</div>}
      <div style={{ background: "#1a2e1a", borderRadius: 12, padding: "1.25rem", marginBottom: "1.25rem", border: "1px solid #2d5a27" }}>
        <p style={{ fontSize: "1rem", lineHeight: 1.65, margin: 0 }}>{q.q}</p>
      </div>
      <div style={{ display: "flex", flexDirection: "column", gap: "0.6rem", marginBottom: "1.25rem" }}>
        {q.options.map((opt, i) => {
          const isSelected = selectedAnswer === opt;
          const isCorrect = opt[0] === q.answer;
          let bg = "#1a2e1a", border = "1px solid #2d5a27";
          if (selectedAnswer) {
            if (isCorrect) { bg = "#14532d"; border = `2px solid ${ac}`; }
            else if (isSelected) { bg = "#450a0a"; border = "2px solid #f87171"; }
          }
          return (
            <button key={i} onClick={() => handleAnswer(opt)}
              style={{ background: bg, border, borderRadius: 8, padding: "0.85rem 1rem", textAlign: "left", color: "#e8f5e9", fontSize: "0.92rem", lineHeight: 1.5 }}>
              {selectedAnswer && isCorrect && <span style={{ color: ac, marginRight: 8 }}>✓</span>}
              {selectedAnswer && isSelected && !isCorrect && <span style={{ color: "#f87171", marginRight: 8 }}>✗</span>}
              {opt}
            </button>
          );
        })}
      </div>
      {showExplanation && (
        <div style={{ background: "#0f2e1f", border: `1px solid ${ac}`, borderRadius: 10, padding: "1rem", marginBottom: "1.25rem" }}>
          <div style={{ color: ac, fontWeight: "bold", fontSize: "0.8rem", textTransform: "uppercase", letterSpacing: "0.05em", marginBottom: "0.5rem" }}>Explanation</div>
          <p style={{ margin: 0, color: "#d1fae5", fontSize: "0.92rem", lineHeight: 1.6 }}>{q.explanation}</p>
        </div>
      )}
      {showExplanation && (
        <button onClick={nextQ} style={{ width: "100%", background: ac, color: "#fff", border: "none", borderRadius: 8, padding: "0.9rem", fontSize: "0.95rem" }}>
          {currentQ + 1 >= questions.length ? "See Results →" : "Next Question →"}
        </button>
      )}
    </div>
  );
}

              <h2 style={{ margin: "0 0 1rem 0", color: "#a5d6a7", fontSize: "1.05rem" }}>🎯 Core Exam — Must Know Cold</h2>
              {[
                ["The label IS the law","Under FIFRA, the pesticide label has the full force of federal law. You CANNOT use a pesticide inconsistently with its labeling."],
                ["States can be MORE restrictive","Federal law is the floor. States can impose stricter requirements — never less strict."],
                ["Lower LD50 = MORE toxic","LD50 of 5 mg/kg is far more dangerous than 500 mg/kg. Less is deadlier."],
                ["Dermal is the #1 route of exposure","About 97% of body exposure during spraying comes through the skin — not inhalation."],
                ["PPE first — ALWAYS","In any emergency (spill, leaking container, fire), put on PPE before taking any other action."],
                ["Cholinesterase inhibitors = OPs and Carbamates","Pyrethroids and phenoxy herbicides do NOT inhibit cholinesterase."],
                ["Sandy soil + low organic matter = most vulnerable to leaching","Clay + high organic matter = most resistant."],
                ["Apply insecticides at night to protect bees","Bees are not foraging; some residues break down before morning."],
              ].map(([title, detail], i) => (
                <div key={i} style={{ display: "flex", gap: "0.75rem", marginBottom: "0.7rem", paddingBottom: "0.7rem", borderBottom: i < 7 ? "1px solid #2d5a27" : "none" }}>
                  <div style={{ color: accent, fontWeight: "bold", minWidth: 22, fontSize: "0.95rem" }}>{i + 1}.</div>
                  <div>
                    <div style={{ color: "#a5d6a7", fontWeight: "bold", fontSize: "0.92rem", marginBottom: "0.2rem" }}>{title}</div>
                    <div style={{ color: "#81c784", fontSize: "0.85rem", lineHeight: 1.5 }}>{detail}</div>
                  </div>
                </div>
              ))}
            </div>
            <div style={{ background: "#1a2e1a", borderRadius: 12, padding: "1.25rem", border: "1px solid #2d5a27" }}>
              <h2 style={{ margin: "0 0 0.75rem 0", color: "#a5d6a7", fontSize: "1.05rem" }}>🔢 Math Formulas</h2>
              {[["Rectangle","Length × Width","100 ft × 50 ft = 5,000 sq ft"],["Triangle","½ × Base × Height","½ × 60 × 30 = 900 sq ft"],["Circle","π × radius²  (π ≈ 3.14)","Diameter=20 → radius=10 → 3.14×100=314 sq ft"],["Lbs per tank","Label rate × (tank ÷ 100)","3 lbs/100 gal × (50÷100) = 1.5 lbs"]].map(([f,c,e],i) => (
                <div key={i} style={{ background: "#0f2e1f", borderRadius: 8, padding: "0.65rem 0.9rem", marginBottom: "0.45rem", border: "1px solid #1a4a2a" }}>
                  <div style={{ color: accent, fontSize: "0.82rem", fontWeight: "bold", marginBottom: "0.2rem" }}>{f}</div>
                  <div style={{ color: "#d1fae5", fontFamily: "monospace", fontSize: "0.92rem", marginBottom: "0.2rem" }}>{c}</div>
                  <div style={{ color: "#6ee7b7", fontSize: "0.78rem" }}>Example: {e}</div>
                </div>
              ))}
            </div>
          </div>
        )}

        {activeTab === "overview" && !isCore && (
          <div>
            <div style={{ background: "#0f2535", borderRadius: 12, padding: "1.25rem", marginBottom: "1.25rem", border: "1px solid #0c3d5c" }}>
              <h2 style={{ margin: "0 0 1rem 0", color: "#7dd3fc", fontSize: "1.05rem" }}>🎯 Cat. 3 Exam — Tennessee-Specific Must-Knows</h2>
              {[
                ["TDA administers TN certification","Tennessee Dept of Agriculture — not EPA — certifies and enforces in Tennessee. State laws must be at least as strict as federal."],
                ["Commercial applicator = charges a fee","The moment you charge a fee for pest control, you're a commercial applicator requiring certification."],
                ["White grubs = #1 turfgrass pest in TN","Treat mid-July to early August — spring treatments are NOT effective. Thatch removal improves control."],
                ["Cutworms = #2 turfgrass pest in TN","Feed at NIGHT; hide in soil during day. Curl into C-shape when disturbed."],
                ["Herbaceous plants more susceptible to phytotoxicity","Never use air blast sprayers for herbicides — risk of off-target damage is too high."],
                ["Crawler stage of scales = easiest to control","Once scales form their protective shell, contact insecticides lose effectiveness."],
                ["Sooty mold = eliminate the pest causing honeydew","Aphids, whiteflies, scales, and mealybugs produce honeydew — address the insect, the mold goes away."],
                ["Most fungal diseases: apply fungicides preventively or early","Especially for powdery mildew, dollar spot, brown patch. Curative programs require rapid diagnosis."],
                ["Records required 2 years in TN","Application records must be available on demand to Commissioner of Agriculture."],
                ["Certification: 18 recertification points per 3-year cycle","Expires June 30 of the third year. In-house training limited to 50% of points."],
              ].map(([title, detail], i) => (
                <div key={i} style={{ display: "flex", gap: "0.75rem", marginBottom: "0.7rem", paddingBottom: "0.7rem", borderBottom: i < 9 ? "1px solid #1a3a4a" : "none" }}>
                  <div style={{ color: accent, fontWeight: "bold", minWidth: 22, fontSize: "0.95rem" }}>{i + 1}.</div>
                  <div>
                    <div style={{ color: "#7dd3fc", fontWeight: "bold", fontSize: "0.92rem", marginBottom: "0.2rem" }}>{title}</div>
                    <div style={{ color: "#93c5fd", fontSize: "0.85rem", lineHeight: 1.5 }}>{detail}</div>
                  </div>
                </div>
              ))}
            </div>
            <div style={{ background: "#0f2535", borderRadius: 12, padding: "1.25rem", border: "1px solid #0c3d5c" }}>
              <h2 style={{ margin: "0 0 0.75rem 0", color: "#7dd3fc", fontSize: "1.05rem" }}>🌿 Key Identification Quick Reference</h2>
              {[
                ["White grubs","Whitish, fat, C-shaped; brown head; 1/8–2 inches; feed on roots 1-2 inches deep; turf rolls back"],
                ["Dollar spot","Small (1-3 inch) straw-colored patches; most common turf disease; warm, moist spring/fall"],
                ["Brown patch","Large patches (up to 3 ft); 'smoke ring' of grayish mycelium; hot, wet weather; tall fescue"],
                ["Powdery mildew (turf)","White/gray growth on leaves; bluegrass ONLY in TN; moderate temps + high humidity"],
                ["Yellow nutsedge","SOLID triangular stems (not hollow like grasses); underground tubers; very difficult to eradicate"],
                ["Aphids","Cluster on stems/leaf undersides; honeydew producers; may be green, red, black, or waxy-coated"],
                ["Fire blight","Most serious bacterial disease; scorched appearance; apple/pear/pyracantha; prune out infected wood"],
              ].map(([pest, desc], i) => (
                <div key={i} style={{ display: "flex", gap: "0.65rem", marginBottom: "0.5rem", paddingBottom: "0.5rem", borderBottom: i < 6 ? "1px solid #1a3a4a" : "none" }}>
                  <div style={{ color: accent, minWidth: 14, fontSize: "0.9rem" }}>▸</div>
                  <div>
                    <span style={{ color: "#7dd3fc", fontWeight: "bold", fontSize: "0.88rem" }}>{pest}: </span>
                    <span style={{ color: "#93c5fd", fontSize: "0.85rem" }}>{desc}</span>
                  </div>
                </div>
              ))}
            </div>
          </div>
        )}

      </div>
    </div>
  );
}

root.render(<App />);
