function StudyGuide() {
  const [activeTab, setActiveTab] = useState("overview");
  const [selectedChapter, setSelectedChapter] = useState(null);
  const [quizMode, setQuizMode] = useState(false);
  const [currentQ, setCurrentQ] = useState(0);
  const [selectedAnswer, setSelectedAnswer] = useState(null);
  const [showExplanation, setShowExplanation] = useState(false);
  const [score, setScore] = useState(0);
  const [quizComplete, setQuizComplete] = useState(false);
  const [quizAnswers, setQuizAnswers] = useState([]);
  const [activeChapterQuiz, setActiveChapterQuiz] = useState(null);

  const startQuiz = (chapterId) => {
    const ch = chapters.find(c => c.id === chapterId) || { questions: chapters.flatMap(c => c.questions) };
    setActiveChapterQuiz(ch);
    setCurrentQ(0);
    setSelectedAnswer(null);
    setShowExplanation(false);
    setScore(0);
    setQuizComplete(false);
    setQuizAnswers([]);
    setQuizMode(true);
  };

  const startFullQuiz = () => {
    const allQ = chapters.flatMap(c => c.questions.map(q => ({ ...q, chapter: c.title })));
    setActiveChapterQuiz({ title: "Full Exam Practice", questions: allQ });
    setCurrentQ(0);
    setSelectedAnswer(null);
    setShowExplanation(false);
    setScore(0);
    setQuizComplete(false);
    setQuizAnswers([]);
    setQuizMode(true);
  };

  const handleAnswer = (option) => {
    if (selectedAnswer) return;
    const correct = option[0] === activeChapterQuiz.questions[currentQ].answer;
    setSelectedAnswer(option);
    setShowExplanation(true);
    if (correct) setScore(s => s + 1);
    setQuizAnswers(prev => [...prev, { correct, q: currentQ }]);
  };

  const nextQuestion = () => {
    if (currentQ + 1 >= activeChapterQuiz.questions.length) {
      setQuizComplete(true);
    } else {
      setCurrentQ(q => q + 1);
      setSelectedAnswer(null);
      setShowExplanation(false);
    }
  };

  const pct = quizComplete ? Math.round((score / activeChapterQuiz.questions.length) * 100) : 0;
  const passColor = pct >= 70 ? "#22c55e" : "#ef4444";

  if (quizMode && activeChapterQuiz) {
    const questions = activeChapterQuiz.questions;
    if (quizComplete) {
      return (
        <div style={{ minHeight: "100vh", background: "#0f1a0f", color: "#e8f5e9", fontFamily: "'Georgia', serif", display: "flex", alignItems: "center", justifyContent: "center", padding: "2rem" }}>
          <div style={{ maxWidth: 540, width: "100%", textAlign: "center" }}>
            <div style={{ fontSize: "4rem", marginBottom: "1rem" }}>{pct >= 70 ? "🎓" : "📚"}</div>
            <h2 style={{ fontSize: "1.8rem", color: "#a5d6a7", marginBottom: "0.5rem" }}>Quiz Complete</h2>
            <p style={{ color: "#81c784", marginBottom: "2rem", fontSize: "1rem" }}>{activeChapterQuiz.title}</p>
            <div style={{ background: "#1a2e1a", borderRadius: 16, padding: "2rem", marginBottom: "2rem", border: `2px solid ${passColor}` }}>
              <div style={{ fontSize: "3.5rem", fontWeight: "bold", color: passColor }}>{pct}%</div>
              <div style={{ color: "#a5d6a7", fontSize: "1.1rem", marginTop: "0.5rem" }}>{score} of {questions.length} correct</div>
              <div style={{ marginTop: "1rem", color: pct >= 70 ? "#86efac" : "#fca5a5", fontSize: "0.95rem" }}>
                {pct >= 70 ? "✓ Passing score — keep it up!" : "✗ Below 70% — review weak areas and retry"}
              </div>
            </div>
            <div style={{ display: "flex", gap: "1rem", justifyContent: "center", flexWrap: "wrap" }}>
              <button onClick={() => { setQuizMode(false); }} style={{ background: "#2d5a27", color: "#e8f5e9", border: "none", borderRadius: 8, padding: "0.75rem 1.5rem", cursor: "pointer", fontSize: "0.95rem" }}>← Back to Guide</button>
              <button onClick={() => startQuiz(activeChapterQuiz.id)} style={{ background: "#166534", color: "#e8f5e9", border: "none", borderRadius: 8, padding: "0.75rem 1.5rem", cursor: "pointer", fontSize: "0.95rem" }}>Retry Quiz</button>
              <button onClick={startFullQuiz} style={{ background: "#14532d", color: "#e8f5e9", border: "1px solid #4ade80", borderRadius: 8, padding: "0.75rem 1.5rem", cursor: "pointer", fontSize: "0.95rem" }}>Full Practice Exam</button>
            </div>
          </div>
        </div>
      );
    }

    const q = questions[currentQ];
    const progress = ((currentQ) / questions.length) * 100;
    return (
      <div style={{ minHeight: "100vh", background: "#0f1a0f", color: "#e8f5e9", fontFamily: "'Georgia', serif", padding: "1.5rem" }}>
        <div style={{ maxWidth: 640, margin: "0 auto" }}>
          <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: "1rem" }}>
            <button onClick={() => setQuizMode(false)} style={{ background: "transparent", color: "#81c784", border: "1px solid #2d5a27", borderRadius: 6, padding: "0.4rem 0.8rem", cursor: "pointer", fontSize: "0.85rem" }}>← Exit</button>
            <span style={{ color: "#81c784", fontSize: "0.9rem" }}>{currentQ + 1} / {questions.length}</span>
            <span style={{ color: "#4ade80", fontSize: "0.9rem", fontWeight: "bold" }}>Score: {score}</span>
          </div>
          <div style={{ height: 6, background: "#1a2e1a", borderRadius: 3, marginBottom: "1.5rem" }}>
            <div style={{ height: "100%", width: `${progress}%`, background: "#4ade80", borderRadius: 3, transition: "width 0.3s" }} />
          </div>
          {q.chapter && <div style={{ color: "#6ee7b7", fontSize: "0.8rem", marginBottom: "0.75rem", letterSpacing: "0.05em", textTransform: "uppercase" }}>{q.chapter}</div>}
          <div style={{ background: "#1a2e1a", borderRadius: 12, padding: "1.5rem", marginBottom: "1.5rem", border: "1px solid #2d5a27" }}>
            <p style={{ fontSize: "1.05rem", lineHeight: 1.6, margin: 0, color: "#e8f5e9" }}>{q.q}</p>
          </div>
          <div style={{ display: "flex", flexDirection: "column", gap: "0.75rem", marginBottom: "1.5rem" }}>
            {q.options.map((opt, i) => {
              const isSelected = selectedAnswer === opt;
              const isCorrect = opt[0] === q.answer;
              let bg = "#1a2e1a";
              let border = "1px solid #2d5a27";
              if (selectedAnswer) {
                if (isCorrect) { bg = "#14532d"; border = "2px solid #4ade80"; }
                else if (isSelected) { bg = "#450a0a"; border = "2px solid #f87171"; }
              }
              return (
                <button key={i} onClick={() => handleAnswer(opt)}
                  style={{ background: bg, border, borderRadius: 8, padding: "1rem 1.25rem", textAlign: "left", color: "#e8f5e9", cursor: selectedAnswer ? "default" : "pointer", fontSize: "0.95rem", lineHeight: 1.5, transition: "all 0.2s" }}>
                  {selectedAnswer && isCorrect && <span style={{ color: "#4ade80", marginRight: 8 }}>✓</span>}
                  {selectedAnswer && isSelected && !isCorrect && <span style={{ color: "#f87171", marginRight: 8 }}>✗</span>}
                  {opt}
                </button>
              );
            })}
          </div>
          {showExplanation && (
            <div style={{ background: "#0f2e1f", border: "1px solid #4ade80", borderRadius: 10, padding: "1rem 1.25rem", marginBottom: "1.5rem" }}>
              <div style={{ color: "#4ade80", fontWeight: "bold", marginBottom: "0.5rem", fontSize: "0.85rem", textTransform: "uppercase", letterSpacing: "0.05em" }}>Explanation</div>
              <p style={{ margin: 0, color: "#d1fae5", fontSize: "0.95rem", lineHeight: 1.6 }}>{q.explanation}</p>
            </div>
          )}
          {showExplanation && (
            <button onClick={nextQuestion} style={{ width: "100%", background: "#166534", color: "#e8f5e9", border: "none", borderRadius: 8, padding: "1rem", fontSize: "1rem", cursor: "pointer", fontFamily: "inherit" }}>
              {currentQ + 1 >= questions.length ? "See Results →" : "Next Question →"}
            </button>
          )}
        </div>
      </div>
    );
  }

          </div>
        </div>
      </div>

      <div style={{ background: "#0a1a0a", borderBottom: "1px solid #1a3a1a", padding: "0 1.5rem" }}>
        <div style={{ maxWidth: 900, margin: "0 auto", display: "flex", gap: "0", overflowX: "auto" }}>
          {["overview", "signal-words", "chapters"].map(tab => (
            <button key={tab} onClick={() => { setActiveTab(tab); setSelectedChapter(null); }}
              style={{ background: activeTab === tab ? "#1a3a1a" : "transparent", color: activeTab === tab ? "#4ade80" : "#81c784", border: "none", borderBottom: activeTab === tab ? "2px solid #4ade80" : "2px solid transparent", padding: "0.75rem 1.25rem", cursor: "pointer", fontSize: "0.9rem", whiteSpace: "nowrap", fontFamily: "inherit" }}>
              {tab === "overview" ? "📌 Quick Reference" : tab === "signal-words" ? "⚠️ Signal Words" : "📚 Chapters"}
            </button>
          ))}
        </div>
      </div>

      <div style={{ maxWidth: 900, margin: "0 auto", padding: "1.5rem" }}>

        {/* OVERVIEW TAB */}
        {activeTab === "overview" && (
          <div>
            <div style={{ background: "#1a2e1a", borderRadius: 12, padding: "1.25rem", marginBottom: "1.5rem", border: "1px solid #2d5a27" }}>
              <h2 style={{ margin: "0 0 1rem 0", color: "#a5d6a7", fontSize: "1.1rem" }}>🎯 Exam Strategy — What You Must Know Cold</h2>
              {[
                ["The label IS the law", "Under FIFRA, the pesticide label has the full force of federal law. You CANNOT use a pesticide in a manner inconsistent with its labeling."],
                ["States can be MORE restrictive", "Federal law is the floor. States, tribes, and territories can impose stricter requirements — never less strict."],
                ["Lower LD50 = MORE toxic", "LD50 of 5 mg/kg is far more dangerous than 500 mg/kg. Less is deadlier — think of it as 'the dose it takes to kill half.'"],
                ["Dermal is the #1 route of exposure", "About 97% of body exposure during spraying comes through the skin — not inhalation. Protect your skin first."],
                ["PPE first — ALWAYS", "In any emergency (spill, leaking container, fire), put on PPE before taking any other action."],
                ["Certified applicators can apply AND supervise RUPs", "They can also allow others to apply under their direct supervision."],
                ["Buy only what you need", "Inventory management prevents storage hazards, disposal costs, and security risks."],
                ["Cholinesterase inhibitors = OPs and Carbamates", "Pyrethroids and phenoxy herbicides do NOT inhibit cholinesterase. This distinction is often tested."],
                ["Sandy soil + low organic matter = most vulnerable to leaching", "Clay + high organic matter = most resistant. High adsorption keeps pesticides in soil."],
                ["Apply insecticides at night to protect bees", "Bees are not foraging; some residues break down before morning. Avoid bloom-time applications."],
              ].map(([title, detail], i) => (
                <div key={i} style={{ display: "flex", gap: "1rem", marginBottom: "0.75rem", paddingBottom: "0.75rem", borderBottom: i < 9 ? "1px solid #2d5a27" : "none" }}>
                  <div style={{ color: "#4ade80", fontWeight: "bold", minWidth: 24, fontSize: "1rem" }}>{i + 1}.</div>
                  <div>
                    <div style={{ color: "#a5d6a7", fontWeight: "bold", fontSize: "0.95rem", marginBottom: "0.25rem" }}>{title}</div>
                    <div style={{ color: "#81c784", fontSize: "0.88rem", lineHeight: 1.5 }}>{detail}</div>
                  </div>
                </div>
              ))}
            </div>

            <div style={{ background: "#1a2e1a", borderRadius: 12, padding: "1.25rem", marginBottom: "1.5rem", border: "1px solid #2d5a27" }}>
              <h2 style={{ margin: "0 0 1rem 0", color: "#a5d6a7", fontSize: "1.1rem" }}>🔢 Math Formulas You Need</h2>
              {[
                ["Rectangle Area", "Length × Width", "100 ft × 50 ft = 5,000 sq ft"],
                ["Triangle Area", "½ × Base × Height", "½ × 60 × 30 = 900 sq ft"],
                ["Circle Area", "π × radius²   (π ≈ 3.14)", "Diameter = 20 ft → radius = 10 ft → 3.14 × 100 = 314 sq ft"],
                ["Application Rate", "(Amount applied ÷ Area treated)", "50 gal sprayed on 2 acres = 25 gal/acre"],
                ["Pounds per tank", "Label rate × (tank size ÷ 100)", "3 lbs/100 gal × (50 gal ÷ 100) = 1.5 lbs"],
              ].map(([formula, calc, example], i) => (
                <div key={i} style={{ background: "#0f2e1f", borderRadius: 8, padding: "0.75rem 1rem", marginBottom: "0.5rem", border: "1px solid #1a4a2a" }}>
                  <div style={{ color: "#4ade80", fontSize: "0.85rem", fontWeight: "bold", marginBottom: "0.3rem" }}>{formula}</div>
                  <div style={{ color: "#d1fae5", fontFamily: "monospace", fontSize: "0.95rem", marginBottom: "0.25rem" }}>{calc}</div>
                  <div style={{ color: "#6ee7b7", fontSize: "0.82rem" }}>Example: {example}</div>
                </div>
              ))}
            </div>

            <div style={{ background: "#1a2e1a", borderRadius: 12, padding: "1.25rem", border: "1px solid #2d5a27" }}>
              <h2 style={{ margin: "0 0 1rem 0", color: "#a5d6a7", fontSize: "1.1rem" }}>🏃 Study Plan — 7 Days to Exam Ready</h2>
              {[
                ["Day 1", "Chapters 1–2", "Pest management & IPM, Federal law (FIFRA), signal words"],
                ["Day 2", "Chapter 3", "Pesticide labeling — read every label element; know signal word categories"],
                ["Day 3", "Chapters 4–5", "Formulations (abbreviations + advantages/disadvantages), Hazards & first aid"],
                ["Day 4", "Chapters 6–7", "PPE (respirator types, filter selection), Environmental movement"],
                ["Day 5", "Chapters 8–9", "Storage/transport/security, Emergency response procedures"],
                ["Day 6", "Chapters 10–11", "Application planning, equipment calibration, math problems"],
                ["Day 7", "FULL REVIEW", "Take the full practice exam above — score under 80%? Review weak chapters"],
              ].map(([day, chapters, focus], i) => (
                <div key={i} style={{ display: "flex", gap: "1rem", marginBottom: "0.6rem", alignItems: "flex-start" }}>
                  <div style={{ background: "#14532d", color: "#4ade80", borderRadius: 6, padding: "0.2rem 0.5rem", fontSize: "0.78rem", fontWeight: "bold", whiteSpace: "nowrap", minWidth: 50, textAlign: "center" }}>{day}</div>
                  <div>
                    <div style={{ color: "#a5d6a7", fontSize: "0.88rem", fontWeight: "bold" }}>{chapters}</div>
                    <div style={{ color: "#6ee7b7", fontSize: "0.82rem" }}>{focus}</div>
                  </div>
                </div>
              ))}
            </div>
          </div>
        )}

        {/* SIGNAL WORDS TAB */}
        {activeTab === "signal-words" && (
          <div>
            <div style={{ background: "#1a2e1a", borderRadius: 12, padding: "1.25rem", marginBottom: "1.5rem", border: "1px solid #2d5a27" }}>
              <h2 style={{ margin: "0 0 1rem 0", color: "#a5d6a7", fontSize: "1.1rem" }}>⚠️ Signal Word Reference — Toxicity Categories</h2>
              <p style={{ color: "#81c784", fontSize: "0.88rem", marginBottom: "1.25rem", lineHeight: 1.6 }}>Signal words reflect <strong style={{ color: "#a5d6a7" }}>ACUTE toxicity only</strong> — they do NOT indicate chronic effects. A lower LD50 number = MORE toxic.</p>
              {signalWordTable.map((row, i) => (
                <div key={i} style={{ background: i === 0 ? "#3b0f0f" : i === 1 ? "#3b2a0f" : i === 2 ? "#2a3b0f" : "#0f2e0f", borderRadius: 10, padding: "1rem 1.25rem", marginBottom: "0.75rem", border: `1px solid ${i === 0 ? "#7f1d1d" : i === 1 ? "#713f12" : i === 2 ? "#365314" : "#14532d"}` }}>
                  <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: "0.5rem", flexWrap: "wrap", gap: "0.5rem" }}>
                    <div style={{ fontWeight: "bold", fontSize: "1rem", color: i === 0 ? "#fca5a5" : i === 1 ? "#fde68a" : i === 2 ? "#bef264" : "#86efac" }}>{row.word}</div>
                    <div style={{ background: "rgba(0,0,0,0.3)", borderRadius: 4, padding: "0.2rem 0.5rem", fontSize: "0.78rem", color: "#d1d5db" }}>Category {row.category}</div>
                  </div>
                  <div style={{ color: "#d1fae5", fontSize: "0.85rem", marginBottom: "0.5rem" }}>{row.description}</div>
                  <div style={{ display: "flex", gap: "1.5rem", fontSize: "0.8rem", color: "#9ca3af", flexWrap: "wrap" }}>
                    <span>Oral LD50: <span style={{ color: "#e8f5e9" }}>{row.oral}</span></span>
                    <span>Dermal LD50: <span style={{ color: "#e8f5e9" }}>{row.dermal}</span></span>
                    <span>Inhalation LC50: <span style={{ color: "#e8f5e9" }}>{row.inhale}</span></span>
                  </div>
                </div>
              ))}
            </div>

            <div style={{ background: "#1a2e1a", borderRadius: 12, padding: "1.25rem", border: "1px solid #2d5a27" }}>
              <h2 style={{ margin: "0 0 1rem 0", color: "#a5d6a7", fontSize: "1.1rem" }}>🧠 Memory Tricks</h2>
              {[
                ["DPW-C mnemonic", "Danger-Poison → Danger → Warning → Caution = most to least toxic. Think 'Deadly, Perilous, Watch out, Careful.'"],
                ["LD50 flip rule", "Lower number = deadlier. LD50 of 1 mg/kg means just 1mg per kg of body weight kills 50% of test animals — tiny dose, huge danger."],
                ["The 3 D's of spills", "Don: PPE first. Defend: stop the source. Dike: contain the spill."],
                ["Sandy soil = sieve", "Think of sandy soil as a kitchen sieve — water and dissolved pesticides pass right through to groundwater."],
                ["EC degrades equipment", "Emulsifiable Concentrates use petroleum solvents — they Eat rubber Cartridges (gaskets, hoses, pump parts)."],
              ].map(([title, tip], i) => (
                <div key={i} style={{ display: "flex", gap: "1rem", marginBottom: "0.75rem", paddingBottom: "0.75rem", borderBottom: i < 4 ? "1px solid #2d5a27" : "none" }}>
                  <div style={{ color: "#4ade80", fontSize: "1.1rem", minWidth: 20 }}>💡</div>
                  <div>
                    <div style={{ color: "#a5d6a7", fontWeight: "bold", fontSize: "0.9rem", marginBottom: "0.2rem" }}>{title}</div>
                    <div style={{ color: "#81c784", fontSize: "0.85rem", lineHeight: 1.5 }}>{tip}</div>
                  </div>
                </div>
              ))}
            </div>
          </div>
        )}

        {/* CHAPTERS TAB */}
        {activeTab === "chapters" && !selectedChapter && (
          <div>
            <p style={{ color: "#81c784", marginBottom: "1.25rem", fontSize: "0.9rem" }}>Select a chapter to review key topics, must-know concepts, and practice questions.</p>
            <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fill, minmax(260px, 1fr))", gap: "0.75rem" }}>
              {chapters.map(ch => (
                <div key={ch.id} onClick={() => setSelectedChapter(ch.id)}
                  style={{ background: "#1a2e1a", borderRadius: 10, padding: "1rem 1.25rem", border: "1px solid #2d5a27", cursor: "pointer", transition: "border-color 0.2s" }}
                  onMouseEnter={e => e.currentTarget.style.borderColor = "#4ade80"}
                  onMouseLeave={e => e.currentTarget.style.borderColor = "#2d5a27"}>
                  <div style={{ fontSize: "1.5rem", marginBottom: "0.5rem" }}>{ch.emoji}</div>
                  <div style={{ color: "#6ee7b7", fontSize: "0.75rem", marginBottom: "0.25rem" }}>Chapter {ch.id}</div>
                  <div style={{ color: "#a5d6a7", fontWeight: "bold", fontSize: "0.95rem", marginBottom: "0.5rem" }}>{ch.title}</div>
                  <div style={{ color: "#81c784", fontSize: "0.8rem" }}>{ch.questions.length} practice questions · {ch.keyTopics.length} key topics</div>
                </div>
              ))}
            </div>
          </div>
        )}

        {/* CHAPTER DETAIL */}
        {activeTab === "chapters" && selectedChapter && (() => {
          const ch = chapters.find(c => c.id === selectedChapter);
          return (
            <div>
              <button onClick={() => setSelectedChapter(null)} style={{ background: "transparent", color: "#81c784", border: "1px solid #2d5a27", borderRadius: 6, padding: "0.4rem 0.8rem", cursor: "pointer", marginBottom: "1.25rem", fontSize: "0.85rem" }}>← All Chapters</button>
              <div style={{ display: "flex", alignItems: "center", gap: "0.75rem", marginBottom: "1.25rem", flexWrap: "wrap" }}>
                <div style={{ fontSize: "2rem" }}>{ch.emoji}</div>
                <div>
                  <div style={{ color: "#6ee7b7", fontSize: "0.75rem" }}>Chapter {ch.id}</div>
                  <h2 style={{ margin: 0, color: "#a5d6a7", fontSize: "1.3rem" }}>{ch.title}</h2>
                </div>
                <button onClick={() => startQuiz(ch.id)} style={{ marginLeft: "auto", background: "#166534", color: "#e8f5e9", border: "1px solid #4ade80", borderRadius: 8, padding: "0.5rem 1rem", cursor: "pointer", fontSize: "0.88rem", fontFamily: "inherit" }}>
                  📝 Take Quiz ({ch.questions.length}Q)
                </button>
              </div>

              <div style={{ background: "#1a2e1a", borderRadius: 12, padding: "1.25rem", marginBottom: "1rem", border: "1px solid #2d5a27" }}>
                <h3 style={{ margin: "0 0 0.75rem 0", color: "#4ade80", fontSize: "0.9rem", textTransform: "uppercase", letterSpacing: "0.08em" }}>📋 Key Topics</h3>
                {ch.keyTopics.map((t, i) => (
                  <div key={i} style={{ display: "flex", gap: "0.75rem", marginBottom: "0.4rem" }}>
                    <div style={{ color: "#4ade80", fontSize: "0.8rem", minWidth: 16 }}>▸</div>
                    <div style={{ color: "#d1fae5", fontSize: "0.88rem" }}>{t}</div>
                  </div>
                ))}
              </div>

              <div style={{ background: "#0f2e1f", borderRadius: 12, padding: "1.25rem", marginBottom: "1rem", border: "1px solid #14532d" }}>
                <h3 style={{ margin: "0 0 0.75rem 0", color: "#4ade80", fontSize: "0.9rem", textTransform: "uppercase", letterSpacing: "0.08em" }}>⭐ Must-Know Concepts</h3>
                {ch.mustKnow.map((m, i) => (
                  <div key={i} style={{ display: "flex", gap: "0.75rem", marginBottom: "0.5rem", paddingBottom: "0.5rem", borderBottom: i < ch.mustKnow.length - 1 ? "1px solid #1a4a2a" : "none" }}>
                    <div style={{ color: "#fbbf24", fontSize: "0.9rem", minWidth: 16 }}>★</div>
                    <div style={{ color: "#a5d6a7", fontSize: "0.88rem", lineHeight: 1.5 }}>{m}</div>
                  </div>
                ))}
              </div>

              <div style={{ textAlign: "center", marginTop: "1.5rem" }}>
                <button onClick={() => startQuiz(ch.id)} style={{ background: "#166534", color: "#e8f5e9", border: "1px solid #4ade80", borderRadius: 10, padding: "0.9rem 2rem", cursor: "pointer", fontSize: "1rem", fontFamily: "inherit" }}>
                  Start Chapter {ch.id} Quiz ({ch.questions.length} questions) →
                </button>
              </div>
            </div>
          );
        })()}
      </div>
    </div>
  );
}

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<StudyGuide />);
  </script>
</body>
</html>
